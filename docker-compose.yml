services:
  test-mongo:
    image: mongo:8.3@sha256:ce32a4b67580c982e2020b07d4ffafdbd9ce474088434294d89c6bd9257f7788
    command: --replSet "rs0"
    ports:
      - 127.0.0.1:27017:27017
    volumes:
      - cbh-mongo:/data/db
    healthcheck:
      test: mongosh --quiet --eval "rs.status().ok" || mongosh --quiet --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}).ok"
      interval: 10s
      start_period: 30s
      timeout: 5s
      retries: 3

volumes:
  cbh-mongo:
