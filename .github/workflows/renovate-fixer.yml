name: Renovate CI Fixer

on:
  pull_request:
    types: [opened]

concurrency:
  group: renovate-fixer-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  investigate:
    if: github.event.pull_request.user.login == 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }}

      - name: Check for existing investigation
        id: check-existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --json comments \
            --jq '[.comments[] | select(.body | contains("<!-- renovate-ci-fixer -->"))] | length')
          if [ "$EXISTING" -gt "0" ]; then
            echo "Claude has already investigated this PR"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node environment
        if: steps.check-existing.outputs.skip != 'true'
        uses: ./.github/actions/setup-node
        with:
          npm_token: ${{ secrets.NPM_TOKEN }}
          start_services: "true"

      - name: Run Claude Code
        if: steps.check-existing.outputs.skip != 'true'
        id: claude
        uses: anthropics/claude-code-action@1c8b699d43e9bfed42b48ef15da85d89bab70960 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "renovate"
          additional_permissions: |
            actions: read
          prompt: |
            You are investigating a Renovate dependency update PR that failed CI.

            Renovate only opens PRs when branch-level automerge has already failed, so this PR represents a dependency update that could not land automatically.

            ## Context
            - Repository: ${{ github.repository }}
            - PR: #${{ github.event.pull_request.number }}
            - Branch: ${{ github.event.pull_request.head.ref }}
            - PR title: ${{ github.event.pull_request.title }}

            ## Instructions

            ### 1. Understand the dependency change
            Read the PR body for Renovate's changelog and release notes:
            ```
            gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }}
            ```

            Look at the actual changes:
            ```
            git diff ${{ github.event.pull_request.base.ref }}..HEAD -- package.json package-lock.json packages/*/package.json
            ```

            Identify which package(s) were updated, the version range (old → new), and whether this is a major, minor, or patch bump.

            ### 2. Check CI failure details
            Find the most recent failed CI run for this branch:
            ```
            gh run list --repo ${{ github.repository }} --branch "${{ github.event.pull_request.head.ref }}" --workflow CI --status failure --limit 1 --json databaseId --jq '.[0].databaseId'
            ```

            Then get the failure logs:
            ```
            gh run view <RUN_ID> --repo ${{ github.repository }} --log-failed
            ```

            If no failed run is found yet (CI may still be running on the newly opened PR), check pending runs and note that in your report.

            ### 3. Research breaking changes and migration guides
            For each updated package:
            - Check GitHub releases between the old and new versions for breaking changes or migration notes
            - Look for CHANGELOG.md entries
            - For **major version bumps**, actively search for a migration guide
            - Scan for keywords: "breaking", "deprecated", "removed", "migration", "incompatible"

            ### 4. Attempt a fix
            If you can identify why CI failed:
            1. Make the necessary code changes (type updates, config changes, import fixes, etc.)
            2. Verify the fix compiles: `npx tsc --noEmit` on affected packages
            3. If tests were failing, run the specific tests: `npx nx run <project>:test`
            4. Commit with conventional format: `fix(deps): <description>`
            5. Push the fix to the PR branch

            Common fixes:
            - Type errors from updated packages → update type usage to match new API
            - Configuration or schema changes → update config files
            - Import path changes → update imports
            - Lock file issues → run `npm install`

            If you cannot fix it, that's fine — your investigation report is still valuable.

            ### 5. Post your findings
            Post a comment on the PR summarizing your investigation:
            ```
            gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "$(cat <<'COMMENT_EOF'
            <!-- renovate-ci-fixer -->
            ## Renovate CI Failure Investigation

            ### Dependency Changes
            <table or list of packages updated with version ranges>

            ### CI Failure Analysis
            <what failed and why, with relevant log excerpts>

            ### Breaking Changes
            <any breaking changes, migration notes, or changelog entries found — or "None found">

            ### Migration Guide
            <relevant migration steps if this is a major bump — or "N/A">

            ### Fix Attempted
            <what you tried; if you pushed a fix, say so; if you couldn't fix it, explain why>

            ### Risk Assessment
            <High/Medium/Low risk and why — consider: scope of changes, test coverage, breaking change surface>

            ### Recommended Action
            <one of: "Fix pushed — CI should re-run automatically" / "Manual intervention needed — <details>" / "Transient failure — consider re-running CI">
            COMMENT_EOF
            )"
            ```

            IMPORTANT rules:
            - The comment MUST include `<!-- renovate-ci-fixer -->` on the first line inside the body. This marker prevents duplicate investigations.
            - Do NOT merge the PR.
            - Do NOT approve the PR.
            - Focus on providing actionable information for a human reviewer.

      - name: Tear down services
        if: always() && steps.check-existing.outputs.skip != 'true'
        run: docker compose down --volumes
