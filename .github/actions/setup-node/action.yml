name: Setup Node environment
description: |
  Set up Node.js and install dependencies.
  Mirrors ClipboardHealth/action-build-nodejs@v4 for use in public repos
  that cannot reference internal GitHub Actions.

  - Validates repo configuration;
  - Sets up Node.js from .nvmrc;
  - Activates pnpm via corepack;
  - Caches pnpm store;
  - Runs `pnpm install --frozen-lockfile` for deterministic installs.

inputs:
  npm_token:
    description: The `NPM_TOKEN` to download CBH private NPM packages.
    required: true
  start_services:
    description: Start repo services with Docker Compose before running `pnpm install`.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4.4.0

    - name: Validate repo configuration files
      shell: bash
      run: |
        set -euo pipefail

        if [ ! -f .nvmrc ]; then
          echo "Expected a repo-root .nvmrc, but none was found." >&2
          exit 1
        fi

        if [ ! -f package.json ]; then
          echo "Expected a repo-root package.json, but none was found." >&2
          exit 1
        fi

        if [ ! -f .npmrc ]; then
          echo "Expected a repo-root .npmrc, but none was found." >&2
          exit 1
        fi

        if [ ! -f pnpm-workspace.yaml ]; then
          echo "Expected a repo-root pnpm-workspace.yaml, but none was found." >&2
          exit 1
        fi

        if [ ! -f pnpm-lock.yaml ]; then
          echo "Expected a repo-root pnpm-lock.yaml for 'pnpm install --frozen-lockfile', but none was found." >&2
          exit 1
        fi

    - name: Setup Node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version-file: .nvmrc
        check-latest: true
        package-manager-cache: false
      env:
        NPM_TOKEN: ${{ inputs.npm_token }}

    - name: Validate engines field
      shell: bash
      run: |
        set -euo pipefail

        engines_node="$(node -p "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); typeof pkg.engines?.node === 'string' ? pkg.engines.node : ''")"

        if [ -z "$engines_node" ]; then
          echo "Expected package.json to contain engines.node, but none was found." >&2
          exit 1
        fi

        if ! [[ "$engines_node" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "engines.node must be an exact version (e.g., '24.12.0'), not a range: $engines_node" >&2
          exit 1
        fi

    - name: Install pnpm
      shell: bash
      run: |
        set -euo pipefail
        corepack enable
        corepack prepare --activate

    - name: Get pnpm store directory
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

    - name: Restore pnpm store cache
      uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      id: pnpm-cache
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles('.nvmrc') }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-${{ hashFiles('.nvmrc') }}-

    - name: Start services and install dependencies
      shell: bash
      env:
        NPM_TOKEN: ${{ inputs.npm_token }}
        START_SERVICES: ${{ inputs.start_services }}
      run: |
        set -euo pipefail
        if [ "$START_SERVICES" = 'true' ]; then
          docker compose up -d --wait --wait-timeout 120 &
          DOCKER_PID=$!
        fi
        pnpm install --frozen-lockfile
        if [ "$START_SERVICES" = 'true' ]; then
          wait "$DOCKER_PID"
        fi

    - name: Save pnpm store cache
      if: steps.pnpm-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ steps.pnpm-cache.outputs.cache-primary-key }}
